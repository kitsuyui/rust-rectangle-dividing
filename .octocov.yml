# https://github.com/k1LoW/octocov?tab=readme-ov-file#configuration
coverage:
  paths:
    - coverage.lcov
  acceptable: current >= 80%
codeToTestRatio:
  code:
    - "src/**/*.rs"
  test:
    - "tests/**/*.rs"
  if: true
  acceptable: ratio >= 1.0
testExecutionTime:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
comment:
  if: is_pull_request
  updatePrevious: true
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
